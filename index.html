<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGMI Dual Stream - Full Drag & Resize</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: white; font-family: system-ui, sans-serif; overflow: hidden; }
    
    .video-box {
      background: #111;
      border: 2px solid #22c55e;
      border-radius: 12px;
      overflow: hidden;
      position: absolute;
      min-width: 380px;
      min-height: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    
    .video-box:hover { border-color: #4ade80; }
    
    .header {
      background: #1a1a1a;
      padding: 12px 16px;
      font-weight: 600;
      text-align: center;
      border-bottom: 1px solid #333;
      user-select: none;
      cursor: move;
    }
    
    iframe { width: 100%; height: calc(100% - 48px); border: none; }
    
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 28px;
      height: 28px;
      cursor: nwse-resize;
      z-index: 30;
      color: #666;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-screen-2xl mx-auto relative h-screen" id="workspace">
    <h1 class="text-3xl font-bold text-center mb-6 text-green-400">BGMI DUAL STREAM VIEWER</h1>

    <!-- Stream 1 -->
    <div class="video-box" id="box1" style="left: 80px; top: 100px; width: 48%; height: 520px;">
      <div class="header">STREAM 1 - MAIN MATCH</div>
      <iframe id="iframe1" allowfullscreen allow="autoplay"></iframe>
      <div class="resize-handle">↘</div>
    </div>

    <!-- Stream 2 -->
    <div class="video-box" id="box2" style="left: 52%; top: 100px; width: 48%; height: 520px;">
      <div class="header">STREAM 2 - MAP / OBSERVER</div>
      <iframe id="iframe2" allowfullscreen allow="autoplay"></iframe>
      <div class="resize-handle">↘</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 border border-zinc-700 rounded-2xl p-5 shadow-2xl flex gap-4 items-center z-50">
    <input id="url1" class="bg-black border border-zinc-700 rounded-xl px-4 py-3 w-80" placeholder="Stream 1 URL">
    <input id="url2" class="bg-black border border-zinc-700 rounded-xl px-4 py-3 w-80" placeholder="Stream 2 URL">
    <button onclick="loadStreams()" class="bg-green-500 hover:bg-green-600 text-black font-bold px-6 py-3 rounded-xl">LOAD STREAMS</button>
    <button onclick="playBoth()" class="bg-green-600 hover:bg-green-500 px-6 py-3 rounded-xl font-bold">▶ PLAY BOTH</button>
    <button onclick="pauseBoth()" class="bg-red-600 hover:bg-red-500 px-6 py-3 rounded-xl font-bold">⏸ PAUSE BOTH</button>
  </div>

  <script>
    function makeDraggableAndResizable(box) {
      const header = box.querySelector('.header');
      const resizeHandle = box.querySelector('.resize-handle');
      
      let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      let isResizing = false;

      // Drag to Move
      header.onmousedown = dragMouseDown;

      function dragMouseDown(e) {
        if (e.target.closest('.resize-handle')) return;
        e.preventDefault();
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeDragElement;
        document.onmousemove = elementDrag;
      }

      function elementDrag(e) {
        e.preventDefault();
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;

        box.style.top = (box.offsetTop - pos2) + "px";
        box.style.left = (box.offsetLeft - pos1) + "px";
      }

      function closeDragElement() {
        document.onmouseup = null;
        document.onmousemove = null;
      }

      // Drag to Resize
      resizeHandle.onmousedown = resizeMouseDown;

      function resizeMouseDown(e) {
        e.preventDefault();
        isResizing = true;
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeResizeElement;
        document.onmousemove = resizeElement;
      }

      function resizeElement(e) {
        if (!isResizing) return;
        e.preventDefault();
        
        const newWidth = box.offsetWidth + (e.clientX - pos3);
        const newHeight = box.offsetHeight + (e.clientY - pos4);
        
        if (newWidth > 380) box.style.width = newWidth + "px";
        if (newHeight > 320) box.style.height = newHeight + "px";
        
        pos3 = e.clientX;
        pos4 = e.clientY;
      }

      function closeResizeElement() {
        isResizing = false;
        document.onmouseup = null;
        document.onmousemove = null;
      }
    }

    // Initialize both boxes
    window.onload = () => {
      makeDraggableAndResizable(document.getElementById('box1'));
      makeDraggableAndResizable(document.getElementById('box2'));
    };

    function getEmbedUrl(url) {
      if (!url) return '';
      const match = url.match(/(?:youtu\.be\/|youtube\.com.*v=)([^#\&\?]+)/);
      return match ? `https://www.youtube.com/embed/${match[1]}?rel=0&modestbranding=1` : url;
    }

    function loadStreams() {
      const u1 = document.getElementById('url1').value.trim();
      const u2 = document.getElementById('url2').value.trim();
      if (u1) document.getElementById('iframe1').src = getEmbedUrl(u1);
      if (u2) document.getElementById('iframe2').src = getEmbedUrl(u2);
      alert("✅ Loaded! Drag header to move • Drag corner to resize");
    }

    function playBoth() {
      const i1 = document.getElementById('iframe1');
      const i2 = document.getElementById('iframe2');
      if (i1.src) i1.src = i1.src.replace('autoplay=0','autoplay=1') || i1.src + '?autoplay=1';
      if (i2.src) i2.src = i2.src.replace('autoplay=0','autoplay=1') || i2.src + '?autoplay=1';
    }

    function pauseBoth() {
      const i1 = document.getElementById('iframe1');
      const i2 = document.getElementById('iframe2');
      if (i1.src) i1.src = i1.src.replace('autoplay=1','autoplay=0');
      if (i2.src) i2.src = i2.src.replace('autoplay=1','autoplay=0');
    }
  </script>
</body>
</html>
