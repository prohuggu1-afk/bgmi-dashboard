<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGMI Dual Stream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: white; font-family: system-ui, sans-serif; }
    
    .video-box {
      background: #111;
      border: 2px solid #22c55e;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      resize: both;
      min-width: 300px;
      min-height: 300px;
      transition: border-color 0.2s;
    }
    
    .video-box:hover {
      border-color: #4ade80;
    }
    
    .header {
      background: #1f1f1f;
      padding: 10px 16px;
      font-weight: 600;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    
    iframe {
      width: 100%;
      height: calc(100% - 48px);
      border: none;
    }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-8 text-green-400">BGMI DUAL STREAM VIEWER</h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="container">
      
      <!-- Stream 1 -->
      <div class="video-box" style="height: 520px;">
        <div class="header">STREAM 1 - MAIN MATCH</div>
        <iframe id="iframe1" allowfullscreen allow="autoplay"></iframe>
      </div>

      <!-- Stream 2 -->
      <div class="video-box" style="height: 520px;">
        <div class="header">STREAM 2 - MAP / OBSERVER</div>
        <iframe id="iframe2" allowfullscreen allow="autoplay"></iframe>
      </div>
    </div>

    <!-- Controls -->
    <div class="mt-8 flex justify-center gap-4">
      <input id="url1" class="bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-3 w-96" placeholder="Paste Stream 1 YouTube URL">
      <input id="url2" class="bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-3 w-96" placeholder="Paste Stream 2 YouTube URL">
      <button onclick="loadStreams()" 
              class="bg-green-500 hover:bg-green-600 text-black font-bold px-8 py-3 rounded-xl">
        LOAD STREAMS
      </button>
    </div>

    <div class="mt-6 flex justify-center gap-4">
      <button onclick="playBoth()" class="bg-green-600 hover:bg-green-500 px-8 py-3 rounded-xl font-bold">▶ PLAY BOTH</button>
      <button onclick="pauseBoth()" class="bg-red-600 hover:bg-red-500 px-8 py-3 rounded-xl font-bold">⏸ PAUSE BOTH</button>
    </div>
  </div>

  <script>
    function getEmbedUrl(url) {
      if (!url) return '';
      const match = url.match(/(?:youtu\.be\/|youtube\.com.*v=)([^#\&\?]+)/);
      return match ? `https://www.youtube.com/embed/${match[1]}?rel=0&modestbranding=1` : url;
    }

    function loadStreams() {
      const u1 = document.getElementById('url1').value.trim();
      const u2 = document.getElementById('url2').value.trim();
      
      if (u1) document.getElementById('iframe1').src = getEmbedUrl(u1);
      if (u2) document.getElementById('iframe2').src = getEmbedUrl(u2);
      
      alert("✅ Streams Loaded! Drag corners to resize.");
    }

    function playBoth() {
      const i1 = document.getElementById('iframe1');
      const i2 = document.getElementById('iframe2');
      if (i1.src) i1.src = i1.src.replace('autoplay=0','autoplay=1') || i1.src + '?autoplay=1';
      if (i2.src) i2.src = i2.src.replace('autoplay=0','autoplay=1') || i2.src + '?autoplay=1';
    }

    function pauseBoth() {
      const i1 = document.getElementById('iframe1');
      const i2 = document.getElementById('iframe2');
      if (i1.src) i1.src = i1.src.replace('autoplay=1','autoplay=0');
      if (i2.src) i2.src = i2.src.replace('autoplay=1','autoplay=0');
    }
  </script>
</body>
</html>
